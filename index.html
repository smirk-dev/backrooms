<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>backrooms</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        color: #d8d2b6;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        overflow: hidden;
        cursor: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #intro {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.2em;
        background: #000;
        color: #c9bf8a;
        z-index: 10;
        cursor: pointer;
        user-select: none;
      }
      #intro p {
        max-width: 28em;
        text-align: center;
        line-height: 1.6;
        font-size: 0.9rem;
        opacity: 0.7;
      }
      #intro .prompt {
        font-size: 0.8rem;
        opacity: 0.4;
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="intro">
      <p>You don't remember walking in here.</p>
      <p>WASD to move. Shift to run. F for flashlight. E to leave a marker. Mouse to look.</p>
      <span class="prompt">click to begin</span>
    </div>
    <script type="module" src="/src/core/main.ts"></script>
  </body>
</html>
